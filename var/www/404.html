<!DOCTYPE html>
<html data-bs-theme="dark" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADT — 404</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:'IBM Plex Sans',sans-serif;background:#08090b;color:#e6edf3;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
    .err-box{text-align:center;padding:40px 30px}
    .err-code{font-family:'IBM Plex Mono',monospace;font-size:72px;font-weight:600;color:rgba(88,166,255,0.2);line-height:1;margin-bottom:12px}
    .err-msg{font-size:18px;font-weight:500;color:#8b949e;margin-bottom:24px}
    .err-sub{font-size:13px;color:#484f58;margin-bottom:32px;max-width:400px;margin-left:auto;margin-right:auto;line-height:1.6}
    .err-link{display:inline-flex;align-items:center;gap:7px;padding:8px 18px;background:rgba(88,166,255,0.1);border:1px solid rgba(88,166,255,0.25);border-radius:5px;color:#58a6ff;font-size:13px;text-decoration:none;transition:all .12s}
    .err-link:hover{background:rgba(88,166,255,0.18);color:#79c0ff}
  </style>
</head>
<body>
  <div class="err-box">
    <div class="err-code">404</div>
    <div class="err-msg">
      Page Not Found
    </div>
    <div class="err-sub">Something went wrong. The server returned an error while processing your request.</div>
    <a class="err-link" href="/"><i class="fas fa-home"></i> Go to Dashboard</a>
  </div>
</body>
</html>
